<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - PCOSense</title>
  <meta name="description" content="Request a password reset email for your PCOSense account."/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-brand">PCOSense</a>

    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Enter your registered email and we will send you a reset link.</p>

    <div id="forgot-password-alert" class="alert alert-error" role="alert"></div>

    <form id="forgot-password-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <input
            id="email" type="email" class="form-control"
            placeholder="jane@example.com" autocomplete="email" required style="padding-left: .75rem;"/>
        </div>
      </div>

      <button id="forgot-password-btn" type="submit" class="btn btn-primary btn-full btn-lg">
        Send Reset Link
      </button>
    </form>

    <p class="auth-footer" style="margin-top: 1.5rem;">
      Remembered your password? <a href="/login.html">Sign in</a>
    </p>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth-flow.js"></script>
</body>
</html>
