<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - PCOSense</title>
  <meta name="description" content="Set a new password for your PCOSense account."/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-brand">PCOSense</a>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Choose a new password for your account.</p>

    <div id="reset-password-alert" class="alert alert-error" role="alert"></div>

    <form id="reset-password-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <div class="input-wrap">
          <input
            id="password" type="password" class="form-control"
            placeholder="Create a new password" autocomplete="new-password" required style="padding-left: .75rem;"/>
          <button type="button" id="pw-toggle" class="toggle-pw" aria-label="Toggle password" style="font-weight:600; font-size:.7rem; text-transform:uppercase;">Show</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <input
            id="confirm-password" type="password" class="form-control"
            placeholder="Re-enter your new password" autocomplete="new-password" required style="padding-left: .75rem;"/>
        </div>
      </div>

      <button id="reset-password-btn" type="submit" class="btn btn-primary btn-full btn-lg">
        Update Password
      </button>
    </form>

    <p class="auth-footer" style="margin-top: 1.5rem;">
      Back to <a href="/login.html">Sign in</a>
    </p>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth-flow.js"></script>
</body>
</html>
